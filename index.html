                                    "做乌饭": "村民取南烛叶入锅煮烂滤取乌色汁液，以该汁液浸泡糯米着色，随后将浸好的糯米入笼蒸熟，最后搭配瘦肉、豌豆等辅料入锅翻炒，即成清香适口的乌饭。"
                                }
                            },
                            "庙会组织与经费": "资金来自村民自筹、外迁族人及周边祈福民众捐赠。收支明细张贴庙内并同步微信群公开。"
                        }
                    },
                    "其他民俗活动与日常信仰": {
                        description: "包括除夕与元宵祭拜、平日许愿等日常信仰活动。",
                        details: "除夕、元宵节均有祭拜仪式。平日常有周边村民前来许愿，尤其是家中学子备考时。",
                        children: {
                            "除夕与元宵祭拜": "除夕、元宵节均有祭拜仪式。正月十六村民携带供品集中摆祭，祭祀结束后族人集体聚餐。",
                            "平日许愿": "平日常有周边村民前来许愿，邻村曾有身体不适者来庙中暂住调养。"
                        }
                    },
                    "竹资源与手工竹编": {
                        description: "毛竹为本地核心山林资源，包括簸箕编织技艺等传统手工。",
                        details: "竹囮村因四面遍布毛竹山得名。簸箕编织约半小时完成一件，匠人常年制作。",
                        children: {
                            "毛竹资源": "竹囮村因四面遍布毛竹山得名，毛竹为本地核心山林资源。",
                            "簸箕编织技艺": "约半小时完成一件；采伐、劈分、削刮、编织成型等步骤。匠人每日可编 4 件，现价约 30 元/套。",
                            "夯土民居现状": "本地已不再新建夯土房屋，仅古村落修缮传统老宅时仍用竹编工具。"
                        }
                    },
                    "村落文旅与媒体传播": {
                        description: "包括文旅价值、文化礼堂、传承意义等。",
                        details: "每年庙会吸引各地摄影爱好者、游客前来采风。文化礼堂被中新网报道为浙江乡村文化典型案例。",
                        children: {
                            "文旅价值": "每年庙会吸引各地摄影爱好者、游客前来采风，带动古村落旅游。竹林成片、古树参天、溪水潺潺。",
                            "文化礼堂": "庙会以村级文化礼堂为组织阵地，成为乡村精神文化活动标杆。",
                            "传承意义": "先锋庙会是竹囮村一年最盛大集体活动，维系宗族乡情、传承山区乡土信仰。"
                        }
                    },
                    "后山古墓": {
                        description: "后山上有一座古墓，根据古墓所用石料及制作精细程度推断墓主地位显赫。",
                        details: "墓前山岗即为村民所说的'龙脉'。是否属于郑娘娘之墓已无从考证。",
                        children: {}
                    }
                }
            }
        };

        // 构建图表数据
        const nodesData = [];
        const linksData = [];
        let nodeId = 0;
        const nodeMap = {};

        // 添加一级节点
        Object.keys(knowledgeData).forEach((village, idx) => {
            const id = nodeId++;
            nodeMap[village] = id;
            nodesData.push({
                id: id,
                name: village,
                level: 1,
                symbolSize: 80,
                itemStyle: { color: '#667eea' },
                data: knowledgeData[village]
            });
        });

        // 添加二级节点
        Object.keys(knowledgeData).forEach(village => {
            const villageId = nodeMap[village];
            Object.keys(knowledgeData[village].subNodes).forEach(subNode => {
                const key = `${village}-${subNode}`;
                const id = nodeId++;
                nodeMap[key] = id;
                nodesData.push({
                    id: id,
                    name: subNode,
                    level: 2,
                    symbolSize: 50,
                    itemStyle: { color: '#764ba2' },
                    data: knowledgeData[village].subNodes[subNode]
                });
                linksData.push({ source: villageId, target: id });
            });
        });

        // 添加三级节点
        Object.keys(knowledgeData).forEach(village => {
            Object.keys(knowledgeData[village].subNodes).forEach(subNode => {
                const key = `${village}-${subNode}`;
                const parentId = nodeMap[key];
                const children = knowledgeData[village].subNodes[subNode].children;
                Object.keys(children).forEach(child => {
                    const childValue = children[child];
                    const childKey = `${key}-${child}`;
                    const childId = nodeId++;
                    nodeMap[childKey] = childId;

                    if (childValue && typeof childValue === 'object' && !Array.isArray(childValue)) {
                        nodesData.push({
                            id: childId,
                            name: child,
                            level: 3,
                            symbolSize: 35,
                            itemStyle: { color: '#f97316' },
                            data: {
                                description: childValue.description || '',
                                details: childValue.details || '',
                                children: childValue.children || {}
                            }
                        });
                        linksData.push({ source: parentId, target: childId });

                        Object.keys(childValue.children || {}).forEach(grandChild => {
                            const grandChildId = nodeId++;
                            const grandChildKey = `${childKey}-${grandChild}`;
                            nodeMap[grandChildKey] = grandChildId;
                            nodesData.push({
                                id: grandChildId,
                                name: grandChild,
                                level: 4,
                                symbolSize: 28,
                                itemStyle: { color: '#0ea5e9' },
                                data: { description: childValue.children[grandChild] }
                            });
                            linksData.push({ source: childId, target: grandChildId });
                        });
                    } else {
                        nodesData.push({
                            id: childId,
                            name: child,
                            level: 3,
                            symbolSize: 35,
                            itemStyle: { color: '#f97316' },
                            data: { description: childValue }
                        });
                        linksData.push({ source: parentId, target: childId });
                    }
                });
            });
        });

        // 初始化图表
        const chart = echarts.init(document.getElementById('chart'));
        const option = {
            title: {
                text: '官岭村与竹囮村知识图谱',
                left: 'center',
                top: 20,
                textStyle: { color: '#333', fontSize: 18, fontWeight: 'bold' }
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    if (params.data) {
                        return params.data.name;
                    }
                    return params.name;
                }
            },
            series: [{
                type: 'graph',
                layout: 'force',
                force: {
                    repulsion: 100,
                    gravity: 0.02,
                    edgeLength: 150,
                    layoutAnimation: true
                },
                data: nodesData,
                links: linksData,
                roam: true,
                label: {
                    show: true,
                    formatter: function(params) {
                        if (params.data.level === 1) {
                            return params.data.name;
                        }
                        return params.data.name;
                    },
                    fontSize: 11,
                    fontWeight: 'bold'
                },
                lineStyle: {
                    color: '#ccc',
                    width: 1,
                    opacity: 0.6
                },
                itemStyle: {
                    borderColor: '#fff',
                    borderWidth: 2,
                    shadowBlur: 10,
                    shadowColor: 'rgba(0,0,0,0.2)'
                },
                emphasis: {
                    label: { show: true, fontSize: 12 },
                    itemStyle: {
                        borderWidth: 3,
                        shadowBlur: 15
                    }
                }
            }]
        };

        chart.setOption(option);

        // 处理节点点击事件
        chart.on('click', function(params) {
            if (params.data) {
                const node = params.data;
                displayInfo(node);
            }
        });

        function displayInfo(node) {
            const infoPanel = document.getElementById('info-panel');
            let html = '';

            if (node.level === 1) {
                // 一级节点
                html = `
                    <div class="card">
                        <div class="card-title">📍 ${node.name}</div>
                        <div class="card-content">${node.data.description}</div>
                        <div class="sub-nodes">
                            <strong>📚 下属部分：</strong>
                            ${Object.keys(node.data.subNodes).map((sub, idx) => `
                                <div class="sub-node-item" onclick="viewSubNode('${node.name}', '${sub}', event)">${idx + 1}. ${sub}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (node.level === 2) {
                // 二级节点
                html = `
                    <div class="card">
                        <div class="card-title">📘 ${node.name}</div>
                        <div class="card-content">${node.data.description}</div>
                        <div class="details">
                            <strong style="color: #667eea;">📄 详细信息：</strong>
                            <div class="detail-text">${node.data.details}</div>
                        </div>
                        <div class="sub-nodes">
                            <strong>🔍 子项目：</strong>
                            ${Object.keys(node.data.children).map((child, idx) => `
                                <div class="sub-node-item" onclick="viewChild('${child}', '${node.data.children[child]}', event)">${idx + 1}. ${child}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (node.level === 3) {
                // 三级节点
                html = `
                    <div class="card">
                        <div class="card-title">📄 ${node.name}</div>
                        <div class="details">
                            <div class="detail-text">${node.data.description || ''}</div>
                        </div>
                        ${node.data.children && Object.keys(node.data.children).length ? `
                            <div class="sub-nodes">
                                <strong>🔍 细分节点：</strong>
                                ${Object.keys(node.data.children).map((child, idx) => `
                                    <div class="sub-node-item" onclick="viewChild('${child}', '${node.data.children[child]}', event)">${idx + 1}. ${child}</div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (node.level === 4) {
                // 四级节点
                html = `
                    <div class="card">
                        <div class="card-title">🔹 ${node.name}</div>
                        <div class="details">
                            <div class="detail-text">${node.data.description || ''}</div>
                        </div>
                    </div>
                `;
            }

            infoPanel.innerHTML = html;
        }

        window.viewSubNode = function(village, subNode, event) {
            event.stopPropagation();
            const node = knowledgeData[village].subNodes[subNode];
            displaySubNodeInfo(subNode, node);
        };

        window.viewChild = function(child, description, event) {
            event.stopPropagation();
            const infoPanel = document.getElementById('info-panel');
            const html = `
                <div class="card">
                    <div class="card-title">📌 ${child}</div>
                    <div class="details">
                        <div class="detail-text">${description}</div>
                    </div>
                </div>
            `;
            infoPanel.innerHTML = html;
        };

        function displaySubNodeInfo(name, data) {
            const infoPanel = document.getElementById('info-panel');
            let html = `
                <div class="card">
                    <div class="card-title">📘 ${name}</div>
                    <div class="card-content">${data.description}</div>
                    <div class="details">
                        <strong style="color: #667eea;">📄 详细信息：</strong>
                        <div class="detail-text">${data.details}</div>
                    </div>
                    <div class="sub-nodes">
                        <strong>🔍 子项目：</strong>
                        ${Object.keys(data.children).map((child, idx) => `
                            <div class="sub-node-item" onclick="viewChild('${child}', '${data.children[child]}', event)">${idx + 1}. ${child}</div>
                        `).join('')}
                    </div>
                </div>
            `;
            infoPanel.innerHTML = html;
        }

        // 响应式调整
        window.addEventListener('resize', () => {
            chart.resize();
        });
    </script>
</body>
</html>
